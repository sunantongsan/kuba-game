<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KUBA Miner - Share Promo Image</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      background: linear-gradient(rgba(135, 206, 235, 0.8), rgba(135, 206, 235, 0.8)), url('https://sunantongsan.github.io/kuba-game/background.jpg') no-repeat center center fixed; 
      background-size: cover;
      color: #FFFFFF; 
      font-family: 'Poppins', sans-serif; 
      text-align: center; 
      padding: 20px; 
    }
    .container { max-width: 400px; margin: auto; }
    canvas { border-radius: 20px; margin: 20px auto; display: block; box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3); }
    .btn { 
      background: none; /* ลบพื้นหลัง */
      color: #FFD700; /* สีเดียวกับหน้าเกม */
      border: none; /* ลบกรอบ */
      padding: 10px 14px; 
      border-radius: 12px; 
      font-weight: 900; 
      font-size: 16px; 
      margin: 10px auto; 
      width: 90%; 
      cursor: pointer; 
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8); /* คงความชัดเจน */
    }
    .btn:active { transform: scale(0.96); }
    .btn.download { color: #FFD700; }
    .btn.share-telegram { color: #0088cc; }
    .btn.share-facebook { color: #3b5998; }
    .btn.share-whatsapp { color: #25D366; }
    .btn.back { color: #E74C3C; }
    .footer { font-size: 12px; color: #E0E0E0; margin-top: 20px; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8); }
    h2 { 
      font-size: 28px; 
      color: #FFD700; 
      text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700; 
      margin-bottom: 10px; 
    }
    p { color: #E0E0E0; font-size: 16px; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8); }
  </style>
</head>
<body>
  <div class="container">
    <h2>Create a Stunning Promo Post</h2>
    <p>Just like Hamster Kombat!</p>
    <canvas id="banner" width="600" height="600"></canvas>
    
    <button class="btn download" onclick="downloadImage()">Download Share Image</button>
    <button class="btn share-telegram" onclick="shareToTelegram()">Share to Telegram</button>
    <button class="btn share-facebook" onclick="shareToFacebook()">Share to Facebook</button>
    <button class="btn share-whatsapp" onclick="shareToWhatsApp()">Share to WhatsApp</button>
    <button class="btn back" onclick="Telegram.WebApp.close()">Back</button>
    
    <p class="footer">Share this image → Get 100,000 KUBA!</p>
  </div>

  <script>
    Telegram.WebApp.ready();
    const userId = Telegram.WebApp.initDataUnsafe?.user?.id || 'unknown';
    const refLink = `https://t.me/kubaminer_bot?start=ref_${userId}`;

    const canvas = document.getElementById('banner');
    const ctx = canvas.getContext('2d');

    // Load character image
    const coinImg = new Image();
    coinImg.crossOrigin = "anonymous";
    coinImg.src = "https://i.ibb.co.com/0jX8s1L/kuba-coin.png"; // Character image

    coinImg.onload = () => drawBanner();

    function drawBanner() {
      const gradient = ctx.createLinearGradient(0, 0, 600, 600);
      gradient.addColorStop(0, '#1a0033');
      gradient.addColorStop(1, '#0a0a1a');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 600, 600);

      // Gold circle
      ctx.beginPath();
      ctx.arc(300, 220, 130, 0, Math.PI * 2);
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFA500';
      ctx.shadowBlur = 40;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Draw character
      ctx.save();
      ctx.beginPath();
      ctx.arc(300, 220, 115, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(coinImg, 300-115, 220-115, 230, 230);
      ctx.restore();

      // Text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 48px "Orbitron", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('KUBA MINER', 300, 380);

      ctx.fillStyle = '#4ade80';
      ctx.font = 'bold 56px "Orbitron", sans-serif';
      ctx.fillText('100,000 KUBA', 300, 440);

      ctx.fillStyle = '#fff';
      ctx.font = '22px "Poppins", sans-serif';
      ctx.fillText('FREE AIRDROP!', 300, 475);

      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 20px "Poppins", sans-serif';
      ctx.fillText('Tap & Earn on Polygon', 300, 505);

      // Link
      ctx.fillStyle = '#aaa';
      ctx.font = '18px monospace';
      const shortLink = refLink.length > 40 ? refLink.slice(0, 37) + '...' : refLink;
      ctx.fillText(shortLink, 300, 545);

      // Small logo
      ctx.fillStyle = '#FFD700';
      ctx.font = '16px sans-serif';
      ctx.fillText('Powered by KUBA Miner', 300, 580);
    }

    function downloadImage() {
      const link = document.createElement('a');
      link.download = 'KUBA_Airdrop_100K.png';
      link.href = canvas.toDataURL();
      link.click();
    }

    function shareToTelegram() {
      const text = `KUBA MINER IS LIVE! 

Tap to Earn 100,000 KUBA FREE! 

✅ 100,000 KUBA
✅ Daily Rewards
✅ Real Polygon Token

${refLink}

#KUBA #Airdrop #Crypto #TapToEarn`;
      const url = `https://t.me/share/url?url=${encodeURIComponent(refLink)}&text=${encodeURIComponent(text)}`;
      window.open(url, '_blank');
    }

    function shareToFacebook() {
      const text = `KUBA MINER IS LIVE! 

Tap to Earn 100,000 KUBA FREE! 

✅ 100,000 KUBA
✅ Daily Rewards
✅ Real Polygon Token

${refLink}

#KUBA #Airdrop #Crypto #TapToEarn`;
      const url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(refLink)}&quote=${encodeURIComponent(text)}`;
      window.open(url, '_blank');
    }

    function shareToWhatsApp() {
      const text = `KUBA MINER IS LIVE! 

Tap to Earn 100,000 KUBA FREE! 

✅ 100,000 KUBA
✅ Daily Rewards
✅ Real Polygon Token

${refLink}

#KUBA #Airdrop #Crypto #TapToEarn`;
      const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
