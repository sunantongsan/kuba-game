<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KUBAMINER</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src='//libtl.com/sdk.js' data-zone='10111635' data-sdk='show_10111635'></script>
  <style>
    /* คงสไตล์เดิมไว้ทั้งหมด */
    * { margin:0; padding:0; box-sizing:border-box; }
    /* ... (สไตล์เดิมทั้งหมดจากโค้ดของคุณ) ... */
    /* เพิ่มสไตล์สำหรับป๊อปอัปต้อนรับ */
    .welcome-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      color: #FFFFFF;
      text-align: center;
    }
    .welcome-modal-content {
      background: none;
      padding: 20px;
      border-radius: 12px;
      max-width: 90%;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    .welcome-modal-content h2 {
      color: #FFD700;
      font-size: 24px;
      margin-bottom: 15px;
    }
    .welcome-modal-content p {
      color: #E0E0E0;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .welcome-modal-content button {
      background: none;
      border: none;
      color: #4ADE80;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- คงส่วน HTML เดิมไว้ -->
    <div class="topbar">
      <div class="left">Points: <span class="highlight" id="pointsDisplay">0</span></div>
      <div class="right">
        <div>KUBA: <span class="balance-kuba" id="kubaBalance">0</span></div>
      </div>
    </div>
    <!-- ... (ส่วน HTML เดิมทั้งหมดจากโค้ดของคุณ) ... -->
    <!-- เพิ่ม Welcome Modal -->
    <div id="welcomeModal" class="welcome-modal">
      <div class="welcome-modal-content">
        <h2>ยินดีต้อนรับสู่ KUBAMINER!</h2>
        <p>เริ่มขุดเหรียญ KUBA และสะสมคะแนนได้เลย!<br>ติดตามข่าวสารได้ที่ <a href="https://t.me/KubaNews" style="color: #4ADE80;">@KubaNews</a></p>
        <button onclick="closeWelcomeModal()">เริ่มเล่น!</button>
      </div>
    </div>
  </div>
  <!-- คง Modal อื่น ๆ (Exchange, Reward, Leaderboard) ไว้เหมือนเดิม -->
  <!-- ... (HTML เดิมของ Modal ทั้งสาม) ... -->

  <script>
    // Game Variables (เหมือนเดิม)
    let points = 0, energy = 100, maxEnergy = 100, tapPower = 1, level = 1;
    let kubaBalanceGame = 0;
    const MAX_LEVEL = 100;
    let isTaping = false, pendingReward = false;
    let exchangeMode = 'kuba-to-points';
    const POINTS_PER_KUBA = 10000;
    const MIN_POINTS_EXCHANGE = 100000;
    const RESTORE_POINTS = 1000000;
    const RESTORE_KUBA = 100;
    const RESTORE_LEVEL = 10;

    // เพิ่มตัวแปรสำหรับเก็บข้อมูลผู้เข้าชม
    let hasVisited = false;

    function loadGame() {
      points = parseFloat(localStorage.getItem('kuba_points')) || 0;
      level = parseInt(localStorage.getItem('kuba_level')) || 1;
      tapPower = level;
      maxEnergy = level * 100;
      energy = parseFloat(localStorage.getItem('kuba_energy')) || maxEnergy;
      energy = Math.min(energy, maxEnergy);
      kubaBalanceGame = parseFloat(localStorage.getItem('kuba_balance_game')) || 0;
      hasVisited = localStorage.getItem('kuba_visited') === 'true';
      if (points < 0) points = 0;
      logAction('load', { points, kubaBalanceGame, level });
      updateUI();
    }

    function saveGame() {
      localStorage.setItem('kuba_points', points);
      localStorage.setItem('kuba_level', level);
      localStorage.setItem('kuba_energy', energy);
      localStorage.setItem('kuba_balance_game', kubaBalanceGame);
      localStorage.setItem('kuba_visited', 'true');
      updateLeaderboard();
      logPlayerData(); // เพิ่มการบันทึกข้อมูลคะแนน
      logAction('save', { points, kubaBalanceGame, level });
    }

    // ฟังก์ชันใหม่: บันทึกข้อมูลผู้เข้าชม
    function logVisitor() {
      const tg = window.Telegram.WebApp;
      const user = tg.initDataUnsafe.user || {};
      const userId = user.id || 'unknown';
      const username = user.username || user.first_name || 'Anonymous';
      const visitTime = new Date().toISOString();
      
      // บันทึกข้อมูลผู้เข้าชมใน localStorage
      let visitors = JSON.parse(localStorage.getItem('kuba_visitors')) || [];
      if (!visitors.some(v => v.userId === userId)) {
        visitors.push({ userId, username, visitTime });
        localStorage.setItem('kuba_visitors', JSON.stringify(visitors));
      }

      // ถ้ามีเซิร์ฟเวอร์ สามารถส่งข้อมูลไปบันทึก
      // fetch('https://your-server.com/save-visitor', {
      //   method: 'POST',
      //   headers: { 'Content-Type': 'application/json' },
      //   body: JSON.stringify({ userId, username, visitTime })
      // }).catch(err => console.error('Failed to save visitor:', err));
    }

    // ฟังก์ชันใหม่: บันทึกข้อมูลคะแนนผู้เล่น
    function logPlayerData() {
      const tg = window.Telegram.WebApp;
      const user = tg.initDataUnsafe.user || {};
      const userId = user.id || 'unknown';
      const username = user.username || user.first_name || 'Anonymous';
      const playerData = {
        userId,
        username,
        points,
        kubaBalance: kubaBalanceGame,
        level,
        lastUpdate: new Date().toISOString()
      };

      // บันทึกข้อมูลผู้เล่นใน localStorage
      let players = JSON.parse(localStorage.getItem('kuba_players')) || [];
      const existingPlayer = players.find(p => p.userId === userId);
      if (existingPlayer) {
        existingPlayer.points = points;
        existingPlayer.kubaBalance = kubaBalanceGame;
        existingPlayer.level = level;
        existingPlayer.lastUpdate = playerData.lastUpdate;
      } else {
        players.push(playerData);
      }
      localStorage.setItem('kuba_players', JSON.stringify(players));

      // ถ้ามีเซิร์ฟเวอร์ สามารถส่งข้อมูลไปบันทึก
      // fetch('https://your-server.com/save-player', {
      //   method: 'POST',
      //   headers: { 'Content-Type': 'application/json' },
      //   body: JSON.stringify(playerData)
      // }).catch(err => console.error('Failed to save player data:', err));
    }

    // ฟังก์ชันใหม่: แสดงข้อความต้อนรับ
    function showWelcomeModal() {
      if (!hasVisited) {
        document.getElementById('welcomeModal').style.display = 'flex';
        hasVisited = true;
        localStorage.setItem('kuba_visited', 'true');
      }
    }

    function closeWelcomeModal() {
      document.getElementById('welcomeModal').style.display = 'none';
    }

    function initGame() {
      points = Math.max(parseFloat(localStorage.getItem('kuba_points')) || 0, RESTORE_POINTS);
      kubaBalanceGame = Math.max(parseFloat(localStorage.getItem('kuba_balance_game')) || 0, RESTORE_KUBA);
      level = Math.max(parseInt(localStorage.getItem('kuba_level')) || 1, RESTORE_LEVEL);
      tapPower = level;
      maxEnergy = level * 100;
      energy = parseFloat(localStorage.getItem('kuba_energy')) || maxEnergy;
      energy = Math.min(energy, maxEnergy);
      if (points < 0) points = 0;
      logAction('init_restore', { points, kubaBalanceGame, level });
      logVisitor(); // บันทึกผู้เข้าชมเมื่อเริ่มเกม
      logPlayerData(); // บันทึกข้อมูลผู้เล่นเริ่มต้น
      updateLeaderboard();
      saveGame();
      regenerateEnergy();
      setupTap();
      updateBalances();
      setInterval(updateBalances, 10000);
      showWelcomeModal(); // แสดงข้อความต้อนรับ
    }

    // ฟังก์ชันที่เหลือคงเดิม
    function updateBalances() { /* ... คงเดิม ... */ }
    function setupTap() { /* ... คงเดิม ... */ }
    function createParticle(text) { /* ... คงเดิม ... */ }
    function createSparkles(count) { /* ... คงเดิม ... */ }
    function applyGlowAndShake(img) { /* ... คงเดิม ... */ }
    function setTimedRemoval(element, duration) { /* ... คงเดิม ... */ }
    function regenerateEnergy() { /* ... คงเดิม ... */ }
    function openExchange() { /* ... คงเดิม ... */ }
    function closeExchange() { /* ... คงเดิม ... */ }
    function setExchangeMode(m) { /* ... คงเดิม ... */ }
    function calculateOutput() { /* ... คงเดิม ... */ }
    function executeExchange() { /* ... คงเดิม ... */ }
    function showRewardChoice() { /* ... คงเดิม ... */ }
    function updateRewardAmounts() { /* ... คงเดิม ... */ }
    function claimPointsReward() {
      if (!pendingReward) return;
      const reward = 300 + (level * 10);
      points += reward;
      logAction('claim_points', { reward });
      saveGame(); // จะเรียก logPlayerData อัตโนมัติ
      updateUI();
      alert(`Received ${reward.toLocaleString()} Points!`);
      closeRewardModal();
    }
    function claimEnergyReward() {
      if (!pendingReward) return;
      const reward = Math.floor(maxEnergy * 0.5);
      energy = Math.min(energy + reward, maxEnergy);
      logAction('claim_energy', { reward });
      saveGame(); // จะเรียก logPlayerData อัตโนมัติ
      updateUI();
      alert(`Received ${reward} Energy!`);
      closeRewardModal();
    }
    function closeRewardModal() { /* ... คงเดิม ... */ }
    function upgradeCharacter() {
      if (level >= MAX_LEVEL) return alert('Max Level!');
      const cost = level === 99 ? 1500000 : 500 + level * 15000;
      if (points < cost) return alert(`Need ${cost} Points!`);
      points -= cost;
      level++;
      tapPower = level;
      maxEnergy = level * 100;
      energy = Math.min(energy, maxEnergy);
      logAction('upgrade', { cost, level });
      saveGame(); // จะเรียก logPlayerData อัตโนมัติ
      updateUI();
    }
    function openReferralAd() { /* ... คงเดิม ... */ }
    function updateUI() { /* ... คงเดิม ... */ }
    function getPlayerName() { /* ... คงเดิม ... */ }
    function updateLeaderboard() { /* ... คงเดิม ... */ }
    function openLeaderboard() { /* ... คงเดิม ... */ }
    function closeLeaderboard() { /* ... คงเดิม ... */ }

    document.addEventListener('DOMContentLoaded', () => {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      initGame();
    });
  </script>
</body>
</html>
