<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KUBAMINER</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src='//libtl.com/sdk.js' data-zone='10111635' data-sdk='show_10111635'></script>
  <style>
    /* คงสไตล์เดิมไว้ */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(rgba(135, 206, 235, 0.8), rgba(135, 206, 235, 0.8)), url('https://sunantongsan.github.io/kuba-game/background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #FFFFFF;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 10px;
      min-height: 100vh; /* ป้องกันหน้าจอว่าง */
    }
    /* ... (สไตล์เดิมทั้งหมด: .container, .topbar, .button-row, .modal, ฯลฯ) ... */
    .welcome-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      color: #FFFFFF;
      text-align: center;
    }
    .welcome-modal-content {
      background: none;
      padding: 20px;
      border-radius: 12px;
      max-width: 90%;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    .welcome-modal-content h2 {
      color: #FFD700;
      font-size: 24px;
      margin-bottom: 15px;
    }
    .welcome-modal-content p {
      color: #E0E0E0;
      font-size: 16px;
      margin-bottom: 20px;
    }
    .welcome-modal-content button {
      background: none;
      border: none;
      color: #4ADE80;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 12px;
    }
    .error-message {
      color: #FF6B6B;
      font-size: 16px;
      margin: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-message" id="errorMessage">เกิดข้อผิดพลาด โปรดลองรีเฟรชหน้า</div>
    <div class="topbar">
      <div class="left">Points: <span class="highlight" id="pointsDisplay">0</span></div>
      <div class="right">
        <div>KUBA: <span class="balance-kuba" id="kubaBalance">0</span></div>
      </div>
    </div>
    <h1>KUBAMINER</h1>
    <div class="button-row">
      <button class="leaderboard-btn" onclick="openLeaderboard()">Leaderboard</button>
      <button class="exchange-btn" onclick="openExchange()">Exchange</button>
      <button class="download-btn" onclick="downloadJSON()">Download Data</button>
    </div>
    <button class="reward-btn" id="rewardButton" onclick="showRewardChoice()">Claim Reward</button>
    <div class="info">
      Level: <span class="highlight" id="level">1</span> | Energy: <span class="energy-text" id="energy">100</span> / <span id="maxEnergy">100</span>
    </div>
    <div class="bald-container">
      <div class="bald" id="baldHead">
        <img id="baldImg" src="bald.png" alt="Tap" onerror="this.src='https://via.placeholder.com/300?text=TAP'" />
      </div>
    </div>
    <button class="upgrade-btn" onclick="upgradeCharacter()">Upgrade (<span id="upgradeCost">500</span> Points)</button>
    <button class="refer-btn" onclick="openReferralAd()">Claim Airdrop!</button>
    <div id="welcomeModal" class="welcome-modal">
      <div class="welcome-modal-content">
        <h2>ยินดีต้อนรับสู่ KUBAMINER!</h2>
        <p>เริ่มขุดเหรียญ KUBA และสะสมคะแนนได้เลย!<br>ติดตามข่าวสารได้ที่ <a href="https://t.me/KubaNews" style="color: #4ADE80;">@KubaNews</a></p>
        <button onclick="closeWelcomeModal()">เริ่มเล่น!</button>
      </div>
    </div>
  </div>
  <!-- คง Modal เดิม (Exchange, Reward, Leaderboard) ไว้ -->
  <!-- ... (HTML เดิมของ Modal ทั้งสาม) ... -->

  <script>
    // Game Variables
    let points = 0, energy = 100, maxEnergy = 100, tapPower = 1, level = 1;
    let kubaBalanceGame = 0;
    const MAX_LEVEL = 100;
    let isTaping = false, pendingReward = false;
    let exchangeMode = 'kuba-to-points';
    const POINTS_PER_KUBA = 10000;
    const MIN_POINTS_EXCHANGE = 100000;
    const RESTORE_POINTS = 1000000;
    const RESTORE_KUBA = 100;
    const RESTORE_LEVEL = 10;
    let hasVisited = false;

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.innerText = message;
      errorDiv.style.display = 'block';
    }

    function loadGame() {
      try {
        points = parseFloat(localStorage.getItem('kuba_points')) || 0;
        level = parseInt(localStorage.getItem('kuba_level')) || 1;
        tapPower = level;
        maxEnergy = level * 100;
        energy = parseFloat(localStorage.getItem('kuba_energy')) || maxEnergy;
        energy = Math.min(energy, maxEnergy);
        kubaBalanceGame = parseFloat(localStorage.getItem('kuba_balance_game')) || 0;
        hasVisited = localStorage.getItem('kuba_visited') === 'true';
        if (points < 0) points = 0;
        logAction('load', { points, kubaBalanceGame, level });
        updateUI();
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการโหลดเกม: ' + e.message);
      }
    }

    function saveGame() {
      try {
        localStorage.setItem('kuba_points', points);
        localStorage.setItem('kuba_level', level);
        localStorage.setItem('kuba_energy', energy);
        localStorage.setItem('kuba_balance_game', kubaBalanceGame);
        localStorage.setItem('kuba_visited', 'true');
        updateLeaderboard();
        logPlayerData();
        logAction('save', { points, kubaBalanceGame, level });
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการบันทึกเกม: ' + e.message);
      }
    }

    function logVisitor() {
      try {
        const tg = window.Telegram.WebApp || {};
        const user = tg.initDataUnsafe?.user || {};
        const userId = user.id || 'unknown';
        const username = user.username || user.first_name || 'Anonymous';
        const visitTime = new Date().toISOString();
        let visitors = JSON.parse(localStorage.getItem('kuba_visitors')) || [];
        if (!visitors.some(v => v.userId === userId)) {
          visitors.push({ userId, username, visitTime });
          localStorage.setItem('kuba_visitors', JSON.stringify(visitors));
        }
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการบันทึกผู้เข้าชม: ' + e.message);
      }
    }

    function logPlayerData() {
      try {
        const tg = window.Telegram.WebApp || {};
        const user = tg.initDataUnsafe?.user || {};
        const userId = user.id || 'unknown';
        const username = user.username || user.first_name || 'Anonymous';
        const playerData = {
          userId,
          username,
          points,
          kubaBalance: kubaBalanceGame,
          level,
          lastUpdate: new Date().toISOString()
        };
        let players = JSON.parse(localStorage.getItem('kuba_players')) || [];
        const existingPlayer = players.find(p => p.userId === userId);
        if (existingPlayer) {
          existingPlayer.points = points;
          existingPlayer.kubaBalance = kubaBalanceGame;
          existingPlayer.level = level;
          existingPlayer.lastUpdate = playerData.lastUpdate;
        } else {
          players.push(playerData);
        }
        localStorage.setItem('kuba_players', JSON.stringify(players));
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการบันทึกข้อมูลผู้เล่น: ' + e.message);
      }
    }

    function downloadJSON() {
      try {
        const visitors = JSON.parse(localStorage.getItem('kuba_visitors')) || [];
        const players = JSON.parse(localStorage.getItem('kuba_players')) || [];
        const data = { visitors, players };
        const jsonStr = JSON.stringify(data, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'kuba_data.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการดาวน์โหลด JSON: ' + e.message);
      }
    }

    function showWelcomeModal() {
      try {
        if (!hasVisited) {
          document.getElementById('welcomeModal').style.display = 'flex';
          hasVisited = true;
          localStorage.setItem('kuba_visited', 'true');
        }
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการแสดงข้อความต้อนรับ: ' + e.message);
      }
    }

    function closeWelcomeModal() {
      try {
        document.getElementById('welcomeModal').style.display = 'none';
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการปิดข้อความต้อนรับ: ' + e.message);
      }
    }

    function initGame() {
      try {
        if (!window.Telegram?.WebApp) {
          showError('ไม่สามารถโหลด Telegram Web App ได้ โปรดลองรีเฟรช');
          return;
        }
        points = Math.max(parseFloat(localStorage.getItem('kuba_points')) || 0, RESTORE_POINTS);
        kubaBalanceGame = Math.max(parseFloat(localStorage.getItem('kuba_balance_game')) || 0, RESTORE_KUBA);
        level = Math.max(parseInt(localStorage.getItem('kuba_level')) || 1, RESTORE_LEVEL);
        tapPower = level;
        maxEnergy = level * 100;
        energy = parseFloat(localStorage.getItem('kuba_energy')) || maxEnergy;
        energy = Math.min(energy, maxEnergy);
        if (points < 0) points = 0;
        logAction('init_restore', { points, kubaBalanceGame, level });
        logVisitor();
        logPlayerData();
        updateLeaderboard();
        saveGame();
        regenerateEnergy();
        setupTap();
        updateBalances();
        setInterval(updateBalances, 10000);
        showWelcomeModal();
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการเริ่มเกม: ' + e.message);
      }
    }

    // ฟังก์ชันที่เหลือคงเดิม (เพิ่ม try-catch เพื่อความปลอดภัย)
    function updateBalances() {
      try {
        document.getElementById('kubaBalance').innerText = kubaBalanceGame.toFixed(4);
        document.getElementById('kubaBalanceExchange').innerText = kubaBalanceGame.toFixed(4);
        logAction('balance_update', { kuba: kubaBalanceGame });
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการอัปเดตยอด: ' + e.message);
      }
    }

    function setupTap() {
      try {
        const bald = document.getElementById('baldHead');
        const baldImg = document.getElementById('baldImg');
        bald.style.pointerEvents = 'auto';
        bald.addEventListener('click', () => {
          if (isTaping) return;
          isTaping = true;
          if (energy < tapPower) {
            alert('Not enough energy!');
            isTaping = false;
            return;
          }
          energy -= tapPower;
          points += tapPower;
          createParticle('+' + tapPower);
          createSparkles(5);
          applyGlowAndShake(baldImg);
          logAction('tap', { points_before: points - tapPower, points_after: points });
          saveGame();
          updateUI();
          setTimeout(() => { isTaping = false; }, 200);
        });
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการตั้งค่าการแตะ: ' + e.message);
      }
    }

    // ... (ฟังก์ชันอื่น ๆ คงเดิม โดยเพิ่ม try-catch ในทุกฟังก์ชัน: createParticle, createSparkles, regenerateEnergy, openExchange, ฯลฯ) ...

    document.addEventListener('DOMContentLoaded', () => {
      try {
        const tg = window.Telegram?.WebApp || {};
        tg.ready && tg.ready();
        tg.expand && tg.expand();
        initGame();
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการโหลดหน้า: ' + e.message);
      }
    });
  </script>
</body>
</html>
