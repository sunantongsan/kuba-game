<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KUBAMINER</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src='//libtl.com/sdk.js' data-zone='10111635' data-sdk='show_10111635'></script>
  <script src="user-manager.js"></script> <!-- เพิ่มการลิงก์ไฟล์ใหม่ -->
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    *:focus { outline: none; }
    body { 
      background: linear-gradient(rgba(135, 206, 235, 0.8), rgba(135, 206, 235, 0.8)), url('https://sunantongsan.github.io/kuba-game/background.jpg') no-repeat center center fixed; 
      background-size: cover;
      color: #FFFFFF;
      font-family: Arial, sans-serif; 
      text-align: center; 
      padding: 10px; 
      overflow: hidden; 
    }
    .container { max-width: 400px; margin: auto; }
    .topbar { 
      display: flex; 
      justify-content: space-between; 
      align-items: flex-start; 
      padding: 10px; 
      font-size: 16px;
    }
    .topbar .left { 
      color: #FFD700; 
      font-weight: bold; 
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    .topbar .right { 
      text-align: right; 
      line-height: 1.4; 
      color: #E0E0E0;
      font-size: 14px; 
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    h1 { 
      font-size: 32px;
      margin: 15px 0; 
      font-weight: bold; 
      color: #FFD700; 
      text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700;
    }
    .button-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
    }
    button {
      background: none;
      border: none;
      color: #FFFFFF; 
      padding: 10px 14px; 
      border-radius: 12px; 
      font-weight: bold; 
      font-size: 16px;
      margin: 10px 0; 
      width: 92%; 
      transition: 0.2s; 
      display: block;
      text-decoration: none;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    button:active { transform: scale(0.98); opacity: 0.8; }
    .exchange-btn { 
      color: #9C88FF; 
      width: auto; 
      margin-left: auto; 
    }
    .reward-btn { color: #FF6B6B; }
    .upgrade-btn { color: #F39C12; }
    .refer-btn { 
      color: #2ED573; 
      width: auto; 
      margin-left: auto; 
    } /* เปลี่ยนจากเดิมให้เข้ากับ Tasks */
    .leaderboard-btn { 
      color: #00C4FF; 
      background: none;
      border: none; 
      box-shadow: 0 0 8px #00C4FF;
      font-size: 14px;
      padding: 8px 16px;
      width: auto;
      margin-right: auto;
      display: inline-block;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    .rank-btn { 
      color: #00C4FF; 
      background: none;
      border: none; 
      box-shadow: 0 0 8px #00C4FF;
      font-size: 14px;
      padding: 8px 16px;
      width: auto;
      margin-left: auto;
      display: inline-block;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    .info { 
      font-size: 16px;
      margin: 8px 0; 
      color: #E0E0E0;
      padding: 8px; 
      border: none;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    .highlight { 
      color: #FFD700; 
      font-weight: bold; 
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    .energy-text { 
      color: #4ADE80; 
      font-weight: bold; 
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    .bald-container { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      margin: 25px auto; 
    }
    .bald { 
      width: 200px;
      height: 200px; 
      cursor: pointer; 
      user-select: none; 
      outline: none; 
      border: none; 
    }
    .bald img { 
      width: 100%; 
      height: 100%; 
      border-radius: 50%; 
      transition: 0.2s; 
      outline: none; 
      border: none; 
    }
    .bald:focus, .bald:active, .bald img:focus, .bald img:active { 
      outline: none; 
      border: none; 
    }
    .bald img:active { transform: scale(0.92); }
    .bald img.glow { box-shadow: 0 0 15px 5px #FFD700, 0 0 25px 10px rgba(255, 215, 0, 0.5); transition: box-shadow 0.2s; }
    .bald img.shake { animation: shake 0.3s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }
    .particle {
      position: absolute; 
      font-size: 20px; 
      pointer-events: none;
      animation: fly 1s ease-out forwards; 
      font-weight: bold;
      color: #FFD700; 
      text-shadow: 0 0 5px #FFD700;
    }
    @keyframes fly { to { transform: translateY(-120px); opacity: 0; } }
    .particle.sparkle {
      font-size: 16px; 
      color: #FFFFFF; 
      text-shadow: 0 0 8px #FFFFFF;
      animation: sparkle 0.8s ease-out forwards;
    }
    @keyframes sparkle {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: translateY(-50px) scale(0.5); opacity: 0; }
    }
    .modal { 
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0, 0, 0, 0.95); 
      z-index: 999; 
      overflow-y: auto; 
    }
    .modal-content { 
      background: none;
      margin: 5% auto; 
      padding: 20px; 
      width: 90%; 
      border: none; 
      text-align: center; 
      max-width: 400px; 
    }
    .redeem-container { padding: 20px; margin: 15px 0; }
    .redeem-title { font-size: 22px; color: #FFD700; margin-bottom: 15px; text-shadow: 0 0 8px #FFD700; }
    .contract-info { color: #E0E0E0; font-size: 12px; margin: 10px 0; word-break: break-all; }
    .contract-info a { color: #4ADE80; text-decoration: underline; }
    .input-group { padding: 16px; margin: 10px 0; text-align: left; }
    .input-group input { background: none; border: none; color: #FFFFFF; font-size: 24px; text-align: right; width: 100%; }
    .input-group label { color: #E0E0E0; font-size: 14px; }
    .close-btn { background: none; border: none; color: #E74C3C; margin: 10px; padding: 12px; border-radius: 12px; font-size: 14px; }
    .balance-kuba { color: #FFD700; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="left">Points: <span class="highlight" id="pointsDisplay">0</span></div>
      <div class="right">
        <div>KUBA: <span class="balance-kuba" id="kubaBalance">0</span></div>
      </div>
    </div>

    <h1>KUBAMINER</h1>
    <div class="button-row">
      <button class="leaderboard-btn" onclick="openLeaderboard()">Leaderboard</button>
      <button class="exchange-btn" onclick="openExchange()">Exchange</button>
    </div>

    <button class="reward-btn" id="rewardButton" onclick="showRewardChoice()">Claim Reward</button>
    <div class="info">
      Level: <span class="highlight" id="level">1</span> | Energy: <span class="energy-text" id="energy">100</span> / <span id="maxEnergy">100</span>
    </div>

    <div class="bald-container">
      <div class="bald" id="baldHead">
        <img id="baldImg" src="bald.png" alt="Tap" onerror="this.src='https://via.placeholder.com/300?text=TAP'" />
      </div>
    </div>

    <button class="upgrade-btn" onclick="upgradeCharacter()">Upgrade (<span id="upgradeCost">500</span> Points)</button>
    <button class="refer-btn" onclick="window.open('tasks.html', '_blank')">Tasks</button> <!-- เปลี่ยนจาก Claim Airdrop! เป็น Tasks -->
    <button class="rank-btn" id="rankBtn" onclick="showRank()">Check My Rank</button>
    <div id="status"></div>
  </div>

  <!-- Exchange Modal -->
  <div id="exchangeModal" class="modal">
    <div class="modal-content">
      <div class="redeem-container">
        <h3 class="redeem-title">Exchange</h3>
        <div class="contract-info">
          <strong>Buy KUBA:</strong> <a href="https://app.uniswap.org/#/swap?chain=polygon&inputCurrency=0x0d500B1d8E8eF31E21C99d1Db9A6444d3ADf1270&outputCurrency=0x8eFc217Bb56e9081455171002F80b84737cB4468" target="_blank">Uniswap</a>
        </div>
        <div class="input-group">
          <label>Your KUBA</label>
          <div style="font-size:28px; color:#FFD700; text-align:right;" id="kubaBalanceExchange">0</div>
        </div>
        <div style="display:flex; gap:10px; margin:15px 0;">
          <button class="exchange-btn" onclick="setExchangeMode('kuba-to-points')" style="flex:1;">KUBA → Points</button>
          <button class="exchange-btn" onclick="setExchangeMode('points-to-kuba')" style="flex:1;">Points → KUBA</button>
        </div>
        <div class="input-group">
          <label id="inputLabel">KUBA Amount</label>
          <input type="number" id="inputAmount" placeholder="10" oninput="calculateOutput()">
        </div>
        <div class="input-group">
          <label>You will receive/spend</label>
          <div style="font-size:28px; color:#4ADE80; text-align:right;" id="outputAmount">0</div>
          <div style="font-size:14px; color:#E0E0E0; text-align:right;" id="outputUnit">Points</div>
        </div>
        <button style="background:none; border:none; color:#4ADE80;" onclick="executeExchange()">Exchange</button>
      </div>
      <button class="close-btn" onclick="closeExchange()">Close</button>
    </div>
  </div>

  <!-- Reward Modal -->
  <div id="rewardModal" class="modal">
    <div class="modal-content">
      <h3 style="color:#FFD700; margin-bottom:15px;">Choose Your Reward!</h3>
      <div style="margin:15px 0; font-size:16px; color:#FFFFFF;">
        Ad watched! Choose one reward:
      </div>
      <button style="background:none; border:none; color:#4ADE80; margin:10px; padding:14px; border-radius:12px; font-weight:bold; font-size:16px;" onclick="claimPointsReward()">
        Receive <span id="pointsRewardAmount">300</span> Points
      </button>
      <button style="background:none; border:none; color:#F39C12; margin:10px; padding:14px; border-radius:12px; font-weight:bold; font-size:16px;" onclick="claimEnergyReward()">
        Receive 50% Energy
      </button>
      <button style="background:none; border:none; color:#E74C3C;" onclick="closeRewardModal()">Cancel</button>
    </div>
  </div>

  <!-- Leaderboard Modal -->
  <div id="leaderboardModal" class="modal">
    <div class="modal-content">
      <h3 style="color:#FFD700; margin-bottom:15px;">Player Leaderboard</h3>
      <div style="margin:10px 0; font-size:16px; color:#E0E0E0;">
        Total Players: <span id="totalPlayers">0</span>
      </div>
      <div id="leaderboardList" style="margin:15px 0; font-size:16px; color:#FFFFFF; text-align:left; max-height:300px; overflow-y:auto;">
        <!-- Leaderboard entries will be populated here -->
      </div>
      <div style="margin:15px 0; font-size:16px; color:#FFD700;">
        Your Rank: <span id="playerRank">Loading...</span>
      </div>
      <button class="close-btn" onclick="closeLeaderboard()">Close</button>
    </div>
  </div>

  <script>
    // Game Variables
    let points = 0, energy = 100, maxEnergy = 100, tapPower = 1, level = 1;
    let kubaBalanceGame = 0;
    const MAX_LEVEL = 100;
    let isTaping = false, pendingReward = false;
    let exchangeMode = 'kuba-to-points';
    const POINTS_PER_KUBA = 10000;
    const MIN_POINTS_EXCHANGE = 100000;
    const RESTORE_POINTS = 1000000;
    const RESTORE_KUBA = 100;
    const RESTORE_LEVEL = 10;

    function loadGame() {
      points = parseFloat(localStorage.getItem('kuba_points')) || 0;
      level = parseInt(localStorage.getItem('kuba_level')) || 1;
      tapPower = level;
      maxEnergy = level * 100;
      energy = parseFloat(localStorage.getItem('kuba_energy')) || maxEnergy;
      energy = Math.min(energy, maxEnergy);
      kubaBalanceGame = parseFloat(localStorage.getItem('kuba_balance_game')) || 0;
      if (points < 0) points = 0;
      logAction('load', { points, kubaBalanceGame, level });
      updateUI();
    }
    function saveGame() { 
      localStorage.setItem('kuba_points', points); 
      localStorage.setItem('kuba_level', level); 
      localStorage.setItem('kuba_energy', energy);
      localStorage.setItem('kuba_balance_game', kubaBalanceGame);
      updateLeaderboard();
      logAction('save', { points, kubaBalanceGame, level });
    }
    function logAction(type, data) {
      let logs = JSON.parse(localStorage.getItem('kuba_logs')) || [];
      logs.push({ type, data, timestamp: new Date().toISOString() });
      localStorage.setItem('kuba_logs', JSON.stringify(logs.slice(-100)));
    }
    function initGame() {
      points = Math.max(parseFloat(localStorage.getItem('kuba_points')) || 0, RESTORE_POINTS);
      kubaBalanceGame = Math.max(parseFloat(localStorage.getItem('kuba_balance_game')) || 0, RESTORE_KUBA);
      level = Math.max(parseInt(localStorage.getItem('kuba_level')) || 1, RESTORE_LEVEL);
      tapPower = level;
      maxEnergy = level * 100;
      energy = parseFloat(localStorage.getItem('kuba_energy')) || maxEnergy;
      energy = Math.min(energy, maxEnergy);
      if (points < 0) points = 0;
      logAction('init_restore', { points, kubaBalanceGame, level });
      updateLeaderboard();
      saveGame();
      regenerateEnergy();
      setupTap();
      updateBalances();
      setInterval(updateBalances, 10000);
    }
    function updateBalances() {
      document.getElementById('kubaBalance').innerText = kubaBalanceGame.toFixed(4);
      document.getElementById('kubaBalanceExchange').innerText = kubaBalanceGame.toFixed(4);
      logAction('balance_update', { kuba: kubaBalanceGame });
    }
    function setupTap() {
      const bald = document.getElementById('baldHead');
      const baldImg = document.getElementById('baldImg');
      bald.style.pointerEvents = 'auto';
      bald.addEventListener('click', () => {
        if (isTaping) return;
        isTaping = true;
        if (energy < tapPower) {
          alert('Not enough energy!');
          isTaping = false;
          return;
        }
        energy -= tapPower;
        points += tapPower;
        addKuba(tapPower); // อัปเดต KUBA ไประบบจัดการ
        createParticle('+' + tapPower);
        createSparkles(5);
        applyGlowAndShake(baldImg);
        logAction('tap', { points_before: points - tapPower, points_after: points });
        saveGame();
        updateUI();
        setTimeout(() => { isTaping = false; }, 200);
      });
    }
    function createParticle(text) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.innerText = text;
      p.style.left = Math.random() * 80 + 10 + '%';
      p.style.top = '40%';
      document.body.appendChild(p);
      setTimedRemoval(p, 1000);
    }
    function createSparkles(count) {
      for (let i = 0; i < count; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'particle sparkle';
        sparkle.innerText = '';
        sparkle.style.left = Math.random() * 80 + 10 + '%';
        sparkle.style.top = '40%';
        const angle = Math.random() * 360;
        const distance = Math.random() * 50 + 20;
        sparkle.style.setProperty('--sparkle-x', `${Math.cos(angle) * distance}px`);
        sparkle.style.setProperty('--sparkle-y', `${Math.sin(angle) * distance}px`);
        document.body.appendChild(sparkle);
        setTimedRemoval(sparkle, 800);
      }
    }
    function applyGlowAndShake(img) {
      img.classList.add('glow', 'shake');
      setTimeout(() => {
        img.classList.remove('glow', 'shake');
      }, 300);
    }
    function setTimedRemoval(element, duration) {
      setTimeout(() => element.remove(), duration);
    }
    function regenerateEnergy() {
      setInterval(() => {
        if (energy < maxEnergy) {
          energy += 1;
          saveGame();
          updateUI();
        }
      }, 1000);
    }
    function openExchange() {
      document.getElementById('exchangeModal').style.display = 'block';
      document.getElementById('inputAmount').value = '';
      document.getElementById('outputAmount').innerText = '0';
      setExchangeMode('kuba-to-points');
      updateBalances();
    }
    function closeExchange() {
      document.getElementById('exchangeModal').style.display = 'none';
    }
    function setExchangeMode(m) {
      exchangeMode = m;
      document.getElementById('inputLabel').innerText = m === 'kuba-to-points' ? 'KUBA Amount' : 'Points Amount';
      document.getElementById('inputAmount').placeholder = m === 'kuba-to-points' ? '10' : '100000';
      document.getElementById('outputUnit').innerText = m === 'kuba-to-points' ? 'Points' : 'KUBA';
      calculateOutput();
    }
    function calculateOutput() {
      const input = parseFloat(document.getElementById('inputAmount').value) || 0;
      const output = exchangeMode === 'kuba-to-points' ? input * POINTS_PER_KUBA : input / POINTS_PER_KUBA;
      document.getElementById('outputAmount').innerText = output.toLocaleString();
    }
    function executeExchange() {
      const input = parseFloat(document.getElementById('inputAmount').value);
      if (input <= 0) return alert('Please enter an amount');
      if (exchangeMode === 'kuba-to-points') {
        if (input < 10) return alert('Minimum 10 KUBA!');
        if (kubaBalanceGame < input) return alert(`Not enough KUBA! You have ${kubaBalanceGame.toFixed(4)} KUBA`);
        kubaBalanceGame -= input;
        points += input * POINTS_PER_KUBA;
        logAction('exchange_kuba_to_points', { kuba: input, points: input * POINTS_PER_KUBA });
        alert(`Exchange successful! +${(input * POINTS_PER_KUBA).toLocaleString()} Points`);
      } else {
        if (input < MIN_POINTS_EXCHANGE) return alert(`Minimum ${MIN_POINTS_EXCHANGE.toLocaleString()} Points!`);
        const neededPoints = input;
        if (points < neededPoints) return alert(`Not enough Points! You need ${neededPoints.toLocaleString()} Points`);
        points -= neededPoints;
        kubaBalanceGame += input / POINTS_PER_KUBA;
        addKuba(input / POINTS_PER_KUBA); // อัปเดต KUBA ไประบบจัดการ
        logAction('exchange_points_to_kuba', { points: neededPoints, kuba: input / POINTS_PER_KUBA });
        alert(`Exchange successful! +${(input / POINTS_PER_KUBA).toLocaleString()} KUBA`);
      }
      saveGame();
      updateUI();
      closeExchange();
    }
    function showRewardChoice() {
      const btn = document.getElementById('rewardButton');
      btn.disabled = true;
      show_10111635().then(() => {
        pendingReward = true;
        updateRewardAmounts();
        document.getElementById('rewardModal').style.display = 'block';
        btn.disabled = false;
      }).catch(() => {
        alert('Please watch the ad to completion');
        btn.disabled = false;
      });
    }
    function updateRewardAmounts() {
      const reward = 300 + (level * 10);
      document.getElementById('pointsRewardAmount').innerText = reward.toLocaleString();
    }
    function claimPointsReward() {
      if (!pendingReward) return;
      const reward = 300 + (level * 10);
      points += reward;
      addKuba(reward / 10000); // อัปเดต KUBA ไประบบจัดการ (สมมติ 1 Point = 0.0001 KUBA)
      logAction('claim_points', { reward });
      saveGame();
      updateUI();
      alert(`Received ${reward.toLocaleString()} Points!`);
      closeRewardModal();
    }
    function claimEnergyReward() {
      if (!pendingReward) return;
      const reward = Math.floor(maxEnergy * 0.5);
      energy = Math.min(energy + reward, maxEnergy);
      logAction('claim_energy', { reward });
      saveGame();
      updateUI();
      alert(`Received ${reward} Energy!`);
      closeRewardModal();
    }
    function closeRewardModal() {
      document.getElementById('rewardModal').style.display = 'none';
      pendingReward = false;
    }
    function upgradeCharacter() {
      if (level >= MAX_LEVEL) return alert('Max Level!');
      const cost = level === 99 ? 1500000 : 500 + level * 15000;
      if (points < cost) return alert(`Need ${cost} Points!`);
      points -= cost;
      level++;
      tapPower = level;
      maxEnergy = level * 100;
      energy = Math.min(energy, maxEnergy);
      logAction('upgrade', { cost, level });
      saveGame();
      updateUI();
    }
    function openReferralAd() { 
      window.open('https://sunantongsan.github.io/kuba-game/share-ad.html', '_blank'); 
    }
    function updateUI() {
      document.getElementById('pointsDisplay').innerText = points.toLocaleString();
      document.getElementById('level').innerText = level;
      document.getElementById('energy').innerText = Math.floor(energy);
      document.getElementById('maxEnergy').innerText = maxEnergy;
      const cost = level >= MAX_LEVEL ? 'MAX' : (level === 99 ? 1500000 : 500 + level * 15000).toLocaleString();
      document.getElementById('upgradeCost').innerText = cost;
    }
    function getPlayerName() {
      const tg = window.Telegram.WebApp;
      const user = tg.initDataUnsafe.user;
      return user ? (user.username || user.first_name || 'Anonymous Player') : 'Anonymous Player';
    }
    function updateLeaderboard() {
      const playerName = getPlayerName();
      const leaderboard = JSON.parse(localStorage.getItem('kuba_leaderboard')) || [];
      const playerEntry = leaderboard.find(entry => entry.name === playerName);
      if (playerEntry) {
        playerEntry.kuba = kubaBalanceGame;
      } else {
        leaderboard.push({ name: playerName, kuba: kubaBalanceGame });
      }
      leaderboard.sort((a, b) => b.kuba - a.kuba);
      localStorage.setItem('kuba_leaderboard', JSON.stringify(leaderboard));
      return leaderboard;
    }
    function openLeaderboard() {
      const leaderboard = updateLeaderboard();
      const playerName = getPlayerName();
      const leaderboardList = document.getElementById('leaderboardList');
      leaderboardList.innerHTML = '';
      document.getElementById('totalPlayers').innerText = leaderboard.length;
      leaderboard.slice(0, 100).forEach((entry, index) => {
        const rank = index + 1;
        const entryDiv = document.createElement('div');
        entryDiv.style.marginBottom = '10px';
        entryDiv.innerHTML = `#${rank} ${entry.name}: ${entry.kuba.toFixed(4)} KUBA`;
        if (entry.name === playerName) {
          entryDiv.style.color = '#FFD700';
          entryDiv.style.fontWeight = 'bold';
        }
        leaderboardList.appendChild(entryDiv);
      });
      const playerRank = leaderboard.findIndex(entry => entry.name === playerName) + 1;
      document.getElementById('playerRank').innerText = playerRank ? `#${playerRank}` : 'No Rank';
      document.getElementById('leaderboardModal').style.display = 'block';
    }
    function closeLeaderboard() {
      document.getElementById('leaderboardModal').style.display = 'none';
    }
    document.addEventListener('DOMContentLoaded', () => {
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
      const initDataUnsafe = tg.initDataUnsafe || {};
      const startParam = initDataUnsafe.start_param || '';
      if (startParam.toLowerCase().includes('kuba')) {
