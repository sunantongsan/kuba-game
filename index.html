<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KUBAMINER</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src='//libtl.com/sdk.js' data-zone='10111635' data-sdk='show_10111635'></script>
  <style>
    /* คงสไตล์เดิมไว้ทั้งหมด */
    * { margin:0; padding:0; box-sizing:border-box; }
    *:focus { outline: none; }
    body { 
      background: linear-gradient(rgba(135, 206, 235, 0.8), rgba(135, 206, 235, 0.8)), url('https://sunantongsan.github.io/kuba-game/background.jpg') no-repeat center center fixed; 
      background-size: cover;
      color: #FFFFFF;
      font-family: Arial, sans-serif; 
      text-align: center; 
      padding: 10px; 
      min-height: 100vh; /* ป้องกันหน้าจอว่าง */
    }
    /* ... (สไตล์เดิมทั้งหมด: .container, .topbar, .button-row, .modal, ฯลฯ) ... */
    .error-message {
      color: #FF6B6B;
      font-size: 16px;
      margin: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-message" id="errorMessage">เกิดข้อผิดพลาด โปรดลองรีเฟรชหน้า</div>
    <div class="topbar">
      <div class="left">Points: <span class="highlight" id="pointsDisplay">0</span></div>
      <div class="right">
        <div>KUBA: <span class="balance-kuba" id="kubaBalance">0</span></div>
      </div>
    </div>
    <h1>KUBAMINER</h1>
    <div class="button-row">
      <button class="leaderboard-btn" onclick="openLeaderboard()">Leaderboard</button>
      <button class="exchange-btn" onclick="openExchange()">Exchange</button>
    </div>
    <button class="reward-btn" id="rewardButton" onclick="showRewardChoice()">Claim Reward</button>
    <div class="info">
      Level: <span class="highlight" id="level">1</span> | Energy: <span class="energy-text" id="energy">100</span> / <span id="maxEnergy">100</span>
    </div>
    <div class="bald-container">
      <div class="bald" id="baldHead">
        <img id="baldImg" src="bald.png" alt="Tap" onerror="this.src='https://via.placeholder.com/300?text=TAP'" />
      </div>
    </div>
    <button class="upgrade-btn" onclick="upgradeCharacter()">Upgrade (<span id="upgradeCost">500</span> Points)</button>
    <button class="refer-btn" onclick="openReferralAd()">Claim Airdrop!</button>
    <!-- Exchange Modal -->
    <div id="exchangeModal" class="modal"> <!-- คงเดิม --> </div>
    <!-- Reward Modal -->
    <div id="rewardModal" class="modal"> <!-- คงเดิม --> </div>
    <!-- Leaderboard Modal -->
    <div id="leaderboardModal" class="modal"> <!-- คงเดิม --> </div>
  </div>

  <script>
    // Game Variables
    let points = 0, energy = 100, maxEnergy = 100, tapPower = 1, level = 1;
    let kubaBalanceGame = 0;
    const MAX_LEVEL = 100;
    let isTaping = false, pendingReward = false;
    let exchangeMode = 'kuba-to-points';
    const POINTS_PER_KUBA = 10000;
    const MIN_POINTS_EXCHANGE = 100000;
    const RESTORE_POINTS = 1000000;
    const RESTORE_KUBA = 100;
    const RESTORE_LEVEL = 10;

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.innerText = message;
      errorDiv.style.display = 'block';
    }

    function loadGame() {
      try {
        points = parseFloat(localStorage.getItem('kuba_points')) || 0;
        level = parseInt(localStorage.getItem('kuba_level')) || 1;
        tapPower = level;
        maxEnergy = level * 100;
        energy = parseFloat(localStorage.getItem('kuba_energy')) || maxEnergy;
        energy = Math.min(energy, maxEnergy);
        kubaBalanceGame = parseFloat(localStorage.getItem('kuba_balance_game')) || 0;
        if (points < 0) points = 0;
        logAction('load', { points, kubaBalanceGame, level });
        updateUI();
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการโหลดเกม: ' + e.message);
      }
    }

    function saveGame() {
      try {
        localStorage.setItem('kuba_points', points);
        localStorage.setItem('kuba_level', level);
        localStorage.setItem('kuba_energy', energy);
        localStorage.setItem('kuba_balance_game', kubaBalanceGame);
        updateLeaderboard();
        logAction('save', { points, kubaBalanceGame, level });
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการบันทึกเกม: ' + e.message);
      }
    }

    function logAction(type, data) {
      try {
        let logs = JSON.parse(localStorage.getItem('kuba_logs')) || [];
        logs.push({ type, data, timestamp: new Date().toISOString() });
        localStorage.setItem('kuba_logs', JSON.stringify(logs.slice(-100)));
      } catch (e) {
        console.error('Error logging action:', e);
      }
    }

    function initGame() {
      try {
        if (!window.Telegram?.WebApp) {
          showError('ไม่สามารถโหลด Telegram Web App ได้ โปรดลองรีเฟรช');
          return;
        }
        points = Math.max(parseFloat(localStorage.getItem('kuba_points')) || 0, RESTORE_POINTS);
        kubaBalanceGame = Math.max(parseFloat(localStorage.getItem('kuba_balance_game')) || 0, RESTORE_KUBA);
        level = Math.max(parseInt(localStorage.getItem('kuba_level')) || 1, RESTORE_LEVEL);
        tapPower = level;
        maxEnergy = level * 100;
        energy = parseFloat(localStorage.getItem('kuba_energy')) || maxEnergy;
        energy = Math.min(energy, maxEnergy);
        if (points < 0) points = 0;
        logAction('init_restore', { points, kubaBalanceGame, level });
        updateLeaderboard();
        saveGame();
        regenerateEnergy();
        setupTap();
        updateBalances();
        setInterval(updateBalances, 10000);
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการเริ่มเกม: ' + e.message);
      }
    }

    function showRewardChoice() {
      try {
        const btn = document.getElementById('rewardButton');
        btn.disabled = true;
        // ตรวจสอบว่า SDK โฆษณาโหลดสำเร็จ
        if (typeof show_10111635 === 'undefined') {
          showError('ไม่สามารถโหลดโฆษณาได้ โปรดลองใหม่');
          btn.disabled = false;
          return;
        }
        show_10111635().then(() => {
          pendingReward = true;
          updateRewardAmounts();
          document.getElementById('rewardModal').style.display = 'block';
          btn.disabled = false;
          logAction('ad_completed', { reward: 'pending' });
        }).catch((e) => {
          showError('กรุณาดูโฆษณาจนจบ: ' + e.message);
          btn.disabled = false;
          logAction('ad_failed', { error: e.message });
        });
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการโหลดโฆษณา: ' + e.message);
        document.getElementById('rewardButton').disabled = false;
      }
    }

    function updateRewardAmounts() {
      try {
        const reward = 300 + (level * 10);
        document.getElementById('pointsRewardAmount').innerText = reward.toLocaleString();
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการอัปเดตรางวัล: ' + e.message);
      }
    }

    function claimPointsReward() {
      try {
        if (!pendingReward) {
          showError('กรุณาดูโฆษณาก่อนรับรางวัล');
          return;
        }
        const reward = 300 + (level * 10);
        points += reward;
        logAction('claim_points', { reward });
        saveGame();
        updateUI();
        alert(`Received ${reward.toLocaleString()} Points!`);
        closeRewardModal();
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการรับรางวัล Points: ' + e.message);
      }
    }

    function claimEnergyReward() {
      try {
        if (!pendingReward) {
          showError('กรุณาดูโฆษณาก่อนรับรางวัล');
          return;
        }
        const reward = Math.floor(maxEnergy * 0.5);
        energy = Math.min(energy + reward, maxEnergy);
        logAction('claim_energy', { reward });
        saveGame();
        updateUI();
        alert(`Received ${reward} Energy!`);
        closeRewardModal();
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการรับรางวัล Energy: ' + e.message);
      }
    }

    function closeRewardModal() {
      try {
        document.getElementById('rewardModal').style.display = 'none';
        pendingReward = false;
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการปิด Modal รางวัล: ' + e.message);
      }
    }

    // ฟังก์ชันที่เหลือคงเดิม
    function updateBalances() {
      try {
        document.getElementById('kubaBalance').innerText = kubaBalanceGame.toFixed(4);
        document.getElementById('kubaBalanceExchange').innerText = kubaBalanceGame.toFixed(4);
        logAction('balance_update', { kuba: kubaBalanceGame });
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการอัปเดตยอด: ' + e.message);
      }
    }

    function setupTap() {
      try {
        const bald = document.getElementById('baldHead');
        const baldImg = document.getElementById('baldImg');
        bald.style.pointerEvents = 'auto';
        bald.addEventListener('click', () => {
          if (isTaping) return;
          isTaping = true;
          if (energy < tapPower) {
            alert('Not enough energy!');
            isTaping = false;
            return;
          }
          energy -= tapPower;
          points += tapPower;
          createParticle('+' + tapPower);
          createSparkles(5);
          applyGlowAndShake(baldImg);
          logAction('tap', { points_before: points - tapPower, points_after: points });
          saveGame();
          updateUI();
          setTimeout(() => { isTaping = false; }, 200);
        });
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการตั้งค่าการแตะ: ' + e.message);
      }
    }

    function createParticle(text) { /* คงเดิม */ }
    function createSparkles(count) { /* คงเดิม */ }
    function applyGlowAndShake(img) { /* คงเดิม */ }
    function setTimedRemoval(element, duration) { /* คงเดิม */ }
    function regenerateEnergy() { /* คงเดิม */ }
    function openExchange() { /* คงเดิม */ }
    function closeExchange() { /* คงเดิม */ }
    function setExchangeMode(m) { /* คงเดิม */ }
    function calculateOutput() { /* คงเดิม */ }
    function executeExchange() { /* คงเดิม */ }
    function upgradeCharacter() { /* คงเดิม */ }
    function openReferralAd() { /* คงเดิม */ }
    function updateUI() { /* คงเดิม */ }
    function getPlayerName() { /* คงเดิม */ }
    function updateLeaderboard() { /* คงเดิม */ }
    function openLeaderboard() { /* คงเดิม */ }
    function closeLeaderboard() { /* คงเดิม */ }

    document.addEventListener('DOMContentLoaded', () => {
      try {
        const tg = window.Telegram?.WebApp || {};
        tg.ready && tg.ready();
        tg.expand && tg.expand();
        const initDataUnsafe = tg.initDataUnsafe || {};
        const startParam = initDataUnsafe.start_param || '';
        if (startParam.toLowerCase().includes('kuba')) {
          const kubaResponse = document.createElement('div');
          kubaResponse.innerHTML = `
            <h2 style="color: #FFD700; margin: 20px 0;">Found "kuba"!</h2>
            <p style="color: #E0E0E0; margin-bottom: 20px;">This is our KUBAMINER game - mine KUBA coins for free!</p>
            <button class="exchange-btn" onclick="tg.openLink('https://t.me/kubaminer_bot/app')">Play KUBAMINER</button>
            <button class="reward-btn" onclick="tg.openLink('https://sunantongsan.github.io/kuba-game/share-ad.html')">Claim Airdrop</button>
            <button class="exchange-btn" onclick="tg.close()">Close</button>
          `;
          document.querySelector('.container').insertBefore(kubaResponse, document.querySelector('.bald-container'));
        }
        initGame();
      } catch (e) {
        showError('เกิดข้อผิดพลาดในการโหลดหน้า: ' + e.message);
      }
    });
  </script>
</body>
</html>
