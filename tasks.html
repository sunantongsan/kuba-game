<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KUBAMINER Tasks</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="user-manager.js"></script> <!-- เรียกใช้ระบบจัดการยูเซอร์ -->
  <style>
    body {
      background: linear-gradient(rgba(135, 206, 235, 0.8), rgba(135, 206, 235, 0.8)), url('https://sunantongsan.github.io/kuba-game/background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #FFFFFF;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 10px;
      overflow: hidden;
    }
    .container { max-width: 400px; margin: auto; }
    h1 { font-size: 32px; margin: 15px 0; color: #FFD700; text-shadow: 0 0 10px #FFD700; }
    .task-item { margin: 15px 0; font-size: 16px; color: #E0E0E0; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8); }
    .task-item a { color: #4ADE80; text-decoration: underline; }
    button {
      background: none;
      border: none;
      color: #FFFFFF;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      margin: 10px 0;
      width: 92%;
      transition: 0.2s;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    button:active { transform: scale(0.98); opacity: 0.8; }
    button.claimable {
      color: #2ECC71; /* สีเขียว */
      border: 2px solid #2ECC71; /* กรอบ */
      box-shadow: 0 0 8px #2ECC71; /* เอฟเฟกต์แสง */
    }
    .close-btn { color: #E74C3C; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tasks</h1>
    <div class="task-item">
      1. Follow Twitter <a href="https://x.com/KubacoinAirdrop" target="_blank">@KubacoinAirdrop</a> to receive 100,000 Points
      <button id="claim1" onclick="claimTask(100000, 'follow_twitter', 1)">Claim</button>
    </div>
    <div class="task-item">
      2. Join Telegram group <a href="https://t.me/+gzmYsT0sBjRmMzg1" target="_blank">https://t.me/+gzmYsT0sBjRmMzg1</a> to receive 100,000 Points
      <button id="claim2" onclick="claimTask(100000, 'join_telegram', 2)">Claim</button>
    </div>
    <div class="task-item">
      3. Invite a friend using your referral link: <a href="https://t.me/kubaminer_bot/app?startapp=ref_{{userId}}" id="referralLink" target="_blank">Click here</a> to receive 200,000 Points per friend (max 20 claims)
      <button id="claim3" onclick="claimTask(200000, 'invite_friend', 3)">Claim</button>
    </div>
    <button class="close-btn" onclick="window.close()">Close</button>
  </div>

  <script>
    // รับ userId จาก user-manager.js
    let userId = window.Telegram.WebApp.initDataUnsafe.user?.id || Math.random().toString(36).substr(2, 9);
    document.getElementById('referralLink').href = `https://t.me/kubaminer_bot/app?startapp=ref_${userId}`;

    // โหลดสถานะการเคลมจาก localStorage
    let claimedTasks = JSON.parse(localStorage.getItem('kuba_claimed_tasks') || '{}');
    let claimsCount = JSON.parse(localStorage.getItem('kuba_claims_count') || '{}');

    // ฟังก์ชันจัดการการเคลม
    function claimTask(amount, taskType, taskId) {
      if (claimedTasks[taskId] && taskId !== 3) {
        alert('This task has already been claimed!');
        return;
      }
      if (taskId === 3 && (claimsCount[taskId] || 0) >= 20) {
        alert('Maximum 20 claims reached for this task!');
        return;
      }

      let confirmed = confirm(`Confirm claiming ${amount} Points for ${taskType}?`);
      if (confirmed) {
        // เพิ่มแต้มในเกม
        addPoints(amount); // ฟังก์ชันใหม่ใน index.html จะต้อง sync กับ points
        if (taskId !== 3) {
          claimedTasks[taskId] = true;
          localStorage.setItem('kuba_claimed_tasks', JSON.stringify(claimedTasks));
          document.getElementById(`claim${taskId}`).classList.remove('claimable');
          document.getElementById(`claim${taskId}`).disabled = true;
        } else {
          claimsCount[taskId] = (claimsCount[taskId] || 0) + 1;
          localStorage.setItem('kuba_claims_count', JSON.stringify(claimsCount));
          if (claimsCount[taskId] >= 20) {
            document.getElementById(`claim${taskId}`).classList.remove('claimable');
            document.getElementById(`claim${taskId}`).disabled = true;
          }
        }
        alert(`Claimed ${amount} Points for ${taskType}!`);
      }
    }

    // ตรวจสอบสถานะภารกิจและปรับปุ่ม
    function updateTaskButtons() {
      if (!claimedTasks[1]) {
        document.getElementById('claim1').classList.add('claimable');
      }
      if (!claimedTasks[2]) {
        document.getElementById('claim2').classList.add('claimable');
      }
      if ((claimsCount[3] || 0) < 20) {
        document.getElementById('claim3').classList.add('claimable');
      }
    }

    // ระบบแจกเหรียญอัตโนมัติเมื่อมีผู้ใช้ใหม่ผ่าน referral
    function checkReferral() {
      const urlParams = new URLSearchParams(window.location.search);
      const refId = urlParams.get('startapp')?.replace('ref_', '');
      if (refId && refId !== userId) {
        let referrals = JSON.parse(localStorage.getItem('kuba_referrals') || '{}');
        if (!referrals[refId]) referrals[refId] = { count: 0 };
        referrals[refId].count += 1;
        localStorage.setItem('kuba_referrals', JSON.stringify(referrals));

        // แจก 200,000 แต้มให้ผู้แนะนำ
        let referrerUsers = JSON.parse(localStorage.getItem('kubaUsers') || '{}');
        if (referrerUsers[refId]) {
          referrerUsers[refId].points = (referrerUsers[refId].points || 0) + 200000;
          localStorage.setItem('kubaUsers', JSON.stringify(referrerUsers));
        }
        alert(`Welcome! 200,000 Points awarded to your referrer (${refId}).`);
      }
    }

    // เรียกฟังก์ชันเมื่อโหลดหน้า
    document.addEventListener('DOMContentLoaded', () => {
      updateTaskButtons();
      checkReferral();
    });

    // ฟังก์ชันเพิ่มแต้ม (ต้อง sync กับ index.html)
    function addPoints(amount) {
      window.parent.postMessage({ type: 'addPoints', amount: amount }, '*');
    }
  </script>
</body>
</html>
