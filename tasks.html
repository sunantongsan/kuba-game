<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KUBAMINER Tasks</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="user-manager.js"></script> <!-- เรียกใช้ระบบจัดการยูเซอร์ -->
  <style>
    body {
      background: linear-gradient(rgba(135, 206, 235, 0.8), rgba(135, 206, 235, 0.8)), url('https://sunantongsan.github.io/kuba-game/background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #FFFFFF;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 10px;
      overflow: hidden;
    }
    .container { max-width: 400px; margin: auto; }
    h1 { font-size: 32px; margin: 15px 0; color: #FFD700; text-shadow: 0 0 10px #FFD700; }
    .task-item { margin: 15px 0; font-size: 16px; color: #E0E0E0; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8); }
    .task-item a { color: #4ADE80; text-decoration: underline; }
    button {
      background: none;
      border: none;
      color: #FFFFFF;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      margin: 10px 0;
      width: 92%;
      transition: 0.2s;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }
    button:active { transform: scale(0.98); opacity: 0.8; }
    .close-btn { color: #E74C3C; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tasks</h1>
    <div class="task-item">
      1. Follow Twitter <a href="https://x.com/KubacoinAirdrop" target="_blank">@KubacoinAirdrop</a> to receive 10,000 KUBA
      <button onclick="claimTask(10000, 'follow_twitter')">Claim</button>
    </div>
    <div class="task-item">
      2. Join Telegram group <a href="https://t.me/+gzmYsT0sBjRmMzg1" target="_blank">https://t.me/+gzmYsT0sBjRmMzg1</a> to receive 10,000 KUBA
      <button onclick="claimTask(10000, 'join_telegram')">Claim</button>
    </div>
    <div class="task-item">
      3. Invite a friend using your referral link: <a href="https://t.me/kubaminer_bot/app?startapp=ref_{{userId}}" id="referralLink" target="_blank">Click here</a> to receive 20,000 KUBA per friend (coins awarded automatically when friend joins)
      <button onclick="claimTask(20000, 'invite_friend')">Claim</button>
    </div>
    <button class="close-btn" onclick="window.close()">Close</button>
  </div>

  <script>
    // รับ userId จาก user-manager.js
    let userId = window.Telegram.WebApp.initDataUnsafe.user?.id || Math.random().toString(36).substr(2, 9);
    document.getElementById('referralLink').href = `https://t.me/kubaminer_bot/app?startapp=ref_${userId}`;

    // ฟังก์ชันจัดการการเคลม
    function claimTask(amount, taskType) {
      let confirmed = confirm(`Confirm claiming ${amount} KUBA for ${taskType}?`);
      if (confirmed) {
        addKuba(amount); // เรียกจาก user-manager.js
        alert(`Claimed ${amount} KUBA for ${taskType}!`);
      }
    }

    // ระบบแจกเหรียญอัตโนมัติเมื่อมีผู้ใช้ใหม่ผ่าน referral
    function checkReferral() {
      const urlParams = new URLSearchParams(window.location.search);
      const refId = urlParams.get('startapp')?.replace('ref_', '');
      if (refId && refId !== userId) {
        let referrals = JSON.parse(localStorage.getItem('kuba_referrals') || '{}');
        if (!referrals[refId]) referrals[refId] = { count: 0 };
        referrals[refId].count += 1;
        localStorage.setItem('kuba_referrals', JSON.stringify(referrals));

        // แจก 20,000 KUBA ให้ผู้แนะนำ
        let referrerUsers = JSON.parse(localStorage.getItem('kubaUsers') || '{}');
        if (referrerUsers[refId]) {
          referrerUsers[refId].kuba += 20000;
          localStorage.setItem('kubaUsers', JSON.stringify(referrerUsers));
        }
        alert(`Welcome! 20,000 KUBA awarded to your referrer (${refId}).`);
      }
    }
    checkReferral(); // เรียกเมื่อโหลดหน้า
  </script>
</body>
</html>
